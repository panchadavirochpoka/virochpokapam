<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The title that appears in the browser tab -->
    <title>My Portfolio | Image Gallery</title>

    <!-- Link to your CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <h1>Pam VIrochpoka</h1>
            <p>Designer</p>
        </div>
        <nav>
            <ul>
                <li><a href="#gallery">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- Main Content -->
    <main>
        <!-- Intro/Hero Section -->
        <section id="about" class="intro">
            <h2>Welcome to my portfolio.</h2>
            <p>Here is a collection of my works.</p>
        </section>
        <!-- The Image Gallery -->
        <section id="gallery" class="photo-grid">

            <!-- Image 1 -->
            <figure class="gallery-item">
                <img src="images/photo1.jpg" alt="A description of the first image for accessibility">
                <figcaption>Large Format Print</figcaption>
            </figure>
            <!-- Image 2 -->
            <figure class="gallery-item">
                <img src="images/photo2.jpg" alt="A description of the second image">
                <figcaption>Project Name 2</figcaption>
            </figure>
            <!-- Image 3 -->
            <figure class="gallery-item">
                <img src="images/photo3.jpg" alt="A description of the third image">
                <figcaption>Project Name 3</figcaption>
            </figure>
            <!-- Add as many <figure> blocks as you need! -->
        </section>
    </main>
    <!-- Footer Section -->
    <footer id="contact">
        <p>© 2026 Panchada Virochpoka. All rights reserved.</p>
        <div class="social-links">
            <a href="https://instagram.com/yourusername">Instagram</a>
            <a href="mailto:your.email@example.com">Email Me</a>
        </div>
    </footer>
</body>
</html>
