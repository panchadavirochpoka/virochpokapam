<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Best Practices -->
    <title>Your Project or Name | Portfolio</title>
    <meta name="description" content="A brief, compelling description of your project or personal portfolio. This appears in search engine results.">

    <!-- Open Graph for Social Media Previews -->
    <meta property="og:title" content="Your Project or Name">
    <meta property="og:description" content="A brief, compelling description of your project.">
    <meta property="og:type" content="website">

    <!-- Modern Typography (Google Fonts - Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Semantic Header -->
    <header class="navbar">
        <nav>
            <div class="logo">MyBrand</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- Main Content Area -->
    <main>

        <!-- Hero Section -->
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <h1>Hello, I'm [Your Name]</h1>
                <p>I build dynamic, premium web experiences.</p>
                <a href="#projects" class="cta-button">View My Work</a>
            </div>
        </section>
        <!-- About Section (Example) -->
        <section id="about" class="about-section">
            <h2>About Me</h2>
            <p>Write a little bit about yourself or your project here.</p>
        </section>
    </main>
    <!-- Semantic Footer -->
    <footer>
        <p>&copy; 2024 [Your Name]. All rights reserved.</p>
    </footer>
    <!-- Link to your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
